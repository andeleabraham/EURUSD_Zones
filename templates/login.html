{% extends "base.html" %}
{% block title %}Login — MT5 Zone Feed{% endblock %}

{% block content %}
<div style="max-width:380px; margin:80px auto;">
  <div style="text-align:center; margin-bottom:28px;">
    <div style="font-size:32px; margin-bottom:8px;">⬡</div>
    <h1 style="font-size:20px; font-weight:600; color:var(--teal);">MT5 Zone Feed</h1>
    <p style="font-size:13px; color:var(--muted); margin-top:4px;">Interesting zones management</p>
  </div>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" autofocus autocomplete="username" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Sign in</button>
    </form>
  </div>
</div>
{% endblock %}
